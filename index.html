<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestureFlow - Hand Gesture Recognition</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Particle Background Canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Click to Start Overlay -->
  <div id="start-overlay" class="start-overlay">
    <div class="start-content">
      <h1 class="neon-text">GestureFlow</h1>
      <p>Click anywhere to start camera and gesture recognition</p>
      <div class="start-hint">✋ Show your hands to detect numbers 0-10</div>
    </div>
  </div>

  <!-- Main Container - Split Screen -->
  <div class="main-container">
    
    <!-- Left Panel: Video Feed -->
    <div class="video-panel">
      <div class="video-container glass-panel">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="hand-overlay"></canvas>
        
        <!-- Center Top: Number Display -->
        <div class="number-overlay" id="number-display">0</div>
        
        <!-- Bottom: Confidence Indicator -->
        <div class="confidence-container">
          <div class="confidence-bar">
            <div class="confidence-fill" id="confidence-fill"></div>
          </div>
          <span class="confidence-text" id="confidence-text">0%</span>
        </div>
      </div>
      
      <!-- Video Controls -->
      <div class="video-controls">
        <button id="fullscreen-btn" class="control-btn">⛶ Full Screen</button>
        <button id="switch-camera" class="control-btn">🔄 Switch Camera</button>
        <button id="sound-toggle" class="control-btn">🔊 Sound: ON</button>
      </div>
    </div>
    
    <!-- Right Panel: Gesture History -->
    <div class="history-panel glass-panel">
      <h3 class="neon-text">Gesture History</h3>
      <div id="history-list"></div>
      <div class="history-controls">
        <button id="clear-history" class="control-btn">Clear</button>
        <button id="export-history" class="control-btn">Export JSON</button>
      </div>
    </div>
    
  </div>

  <!-- Error Display -->
  <div id="error-message" class="error-display"></div>

  <!-- Load JavaScript Modules -->
  <script src="camera.js"></script>
  <script src="gesture.js"></script>
  <script src="audio.js"></script>
  <script src="history.js"></script>
  <script src="fullscreen.js"></script>
  <script src="particles.js"></script>
  <script src="confidence.js"></script>
  <script src="main.js"></script>
</body>
</html>
